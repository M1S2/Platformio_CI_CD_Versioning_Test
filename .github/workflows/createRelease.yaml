name: Release Firmware

on:
  push:
    tags:
      - 'SW_v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#SW_v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Patch version into code
        run: |
          sed -i "s/@VERSION@/${{ steps.version.outputs.version }}/" Part1/Software/include/version.h  

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Part1
        working-directory: Part1/Software
        run: pio run

      - name: Build LittleFS image of Part1
        working-directory: Part1/Software
        run: pio run --target buildfs

      - name: Rename binaries
        run: |
          cp Part1/Software/.pio/build/esp12e/firmware.bin part1_fw_${{ steps.version.outputs.version }}.bin
          cp Part1/Software/.pio/build/esp12e/littlefs.bin part1_fs_${{ steps.version.outputs.version }}.bin

      - name: Generate SHA256
        run: |
          sha256sum part1_fw_${{ steps.version.outputs.version }}.bin > part1_fw_${{ steps.version.outputs.version }}.sha256
          sha256sum part1_fs_${{ steps.version.outputs.version }}.bin > part1_fs_${{ steps.version.outputs.version }}.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Firmware ${{ steps.version.outputs.version }}"
          files: |
            part1_fw_${{ steps.version.outputs.version }}.bin
            part1_fs_${{ steps.version.outputs.version }}.bin
            part1_fw_${{ steps.version.outputs.version }}.sha256
            part1_fs_${{ steps.version.outputs.version }}.sha256