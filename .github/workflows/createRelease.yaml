name: Release Firmware

on:
  push:
    tags:
      - 'SW_v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#SW_v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Patch version into code
        run: |
          sed -i "s/@VERSION@/${{ steps.version.outputs.version }}/" Part1/Software/include/version.h  

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Part1
        working-directory: Part1/Software
        run: pio run

      - name: Build LittleFS image of Part1
        working-directory: Part1/Software
        run: pio run --target buildfs

      - name: Rename binaries
        run: |
          cp Part1/Software/.pio/build/esp12e/firmware.bin part1_fw_${{ steps.version.outputs.version }}.bin
          cp Part1/Software/.pio/build/esp12e/littlefs.bin part1_fs_${{ steps.version.outputs.version }}.bin

      - name: Generate MD5 checksums
        run: |
          PART1_FW_MD5=$(md5sum part1_fw_${{ steps.version.outputs.version }}.bin | awk '{print $1}')
          PART1_FS_MD5=$(md5sum part1_fs_${{ steps.version.outputs.version }}.bin | awk '{print $1}')
          echo "PART1_FW_MD5=$PART1_FW_MD5" >> $GITHUB_ENV
          echo "PART1_FS_MD5=$PART1_FS_MD5" >> $GITHUB_ENV

      - name: Create manifest
        run: |
          cat <<EOF > manifest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "part1_fw": "part1_fw_${{ steps.version.outputs.version }}.bin",
            "part1_fs": "part1_fs_${{ steps.version.outputs.version }}.bin",
            "part1_fw_md5": "${PART1_FW_MD5}",
            "part1_fs_md5": "${PART1_FS_MD5}"
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Firmware ${{ steps.version.outputs.version }}"
          files: |
            manifest.json
            part1_fw_${{ steps.version.outputs.version }}.bin
            part1_fs_${{ steps.version.outputs.version }}.bin