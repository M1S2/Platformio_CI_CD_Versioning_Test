name: Dev Firmware

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build-dev:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The version will be e.g. "dev-SW_v1.2.0-p5-a1b2c3" or "dev-none-p0-a1b2c3"
      - name: Generate dev version
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          if [ "$LAST_TAG" = "none" ]; then
            DISTANCE="0"
          else
            DISTANCE=$(git rev-list ${LAST_TAG}..HEAD --count)
          fi

          echo "version=dev-${LAST_TAG}-p${DISTANCE}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Patch version into code
        run: |
          sed -i "s/@VERSION@/${{ steps.version.outputs.version }}/" Part1/Software/include/version.h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build Part1
        working-directory: Part1/Software
        run: pio run

      - name: Build LittleFS image of Part1
        working-directory: Part1/Software
        run: pio run --target buildfs

      - name: Prepare files for Part1
        run: |
          mkdir -p dist/firmware/dev

          cp Part1/Software/.pio/build/esp12e/firmware.bin dist/firmware/dev/part1_fw.bin
          cp Part1/Software/.pio/build/esp12e/littlefs.bin dist/firmware/dev/part1_fs.bin

      - name: Generate MD5 checksums
        run: |
          PART1_FW_MD5=$(md5sum dist/firmware/dev/part1_fw.bin | awk '{print $1}')
          PART1_FS_MD5=$(md5sum dist/firmware/dev/part1_fs.bin | awk '{print $1}')
          echo "PART1_FW_MD5=$PART1_FW_MD5" >> $GITHUB_ENV
          echo "PART1_FS_MD5=$PART1_FS_MD5" >> $GITHUB_ENV

      - name: Create manifest
        run: |
          cat <<EOF > dist/firmware/dev/manifest.json
          {
            "version": "${{ steps.version.outputs.version }}",
            "part1_fw": "part1_fw.bin",
            "part1_fs": "part1_fs.bin",
            "part1_fw_md5": "${PART1_FW_MD5}",
            "part1_fs_md5": "${PART1_FS_MD5}"
          }
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allow_empty_commit: false
          force_orphan: true
          publish_dir: ./dist
          publish_branch: gh-pages